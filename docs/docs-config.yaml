# Configuración de gobernanza de documentación (docs governor)
# Referencia: docs/skillreferencia/docs-governor-copy/references/schemas.md

inherit_gitignore: false

ignore:
  - "docs/Prototipos/**"
  - "docs/Prototipo08vercel/**"
  - "docs/ReferenciasViejas/**"
  - "docs/skillreferencia/**"
